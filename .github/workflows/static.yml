name: Static Analysis
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    name: Static analysis
    steps:
      - uses: actions/checkout@v2
      - name: Set up Node
        uses: actions/setup-node@v2
        with:
          node-version: '24'
          cache: 'npm'
      - name: 'Install dependencies'
        run: npm ci
      - name: 'Lint'
        run: npm run lint
      - name: 'Type check'
        run: npm run type-check
      - name: 'Formatting'
        run: |
          npx prettier . --check --ignore-unknown
          npm run dev -- --check
